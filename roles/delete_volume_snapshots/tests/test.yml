---
- name: Test delete_volume_snapshots role
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    delete_volume_snapshots_oc_api_url: "https://api.example.openshift.com:6443"
    delete_volume_snapshots_oc_api_token: "<your_api_token>"
    delete_volume_snapshots_pvc_namespace: test-project
    delete_volume_snapshots_volume_snapshot_specs:
      - { snapshot_name: nfs-pvc-snapshot-1, pvc_name: test-nfs-pvc-1 }
  roles:
    - delete_volume_snapshots
