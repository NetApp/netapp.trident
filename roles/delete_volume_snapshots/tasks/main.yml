---
# Delete VolumeSnapshots of the specified PVCs from the given namespace.

# Preflight: verify required variables are defined and not empty.
- name: Verify required variables are defined and not empty
  ansible.builtin.fail:
    msg: "Required variable '{{ item }}' is not defined or empty"
  when: "vars[item] is not defined or (vars[item] | length == 0)"
  loop:
    - delete_volume_snapshots_oc_api_url
    - delete_volume_snapshots_oc_api_token
    - delete_volume_snapshots_pvc_namespace
    - delete_volume_snapshots_volume_snapshot_specs

# Define a YAML anchor for OpenShift/Kubernetes API login info.
# Reused below via '<<: *k8s_auth' to avoid repeating host/api_key/validate_certs
# across every k8s task.
- name: Define anchor for OpenShift/Kubernetes API login info
  ansible.builtin.set_fact:
    k8s_auth: &k8s_auth
      host: "{{ delete_volume_snapshots_oc_api_url }}"
      api_key: "{{ delete_volume_snapshots_oc_api_token }}"
      validate_certs: false

# Delete VolumeSnapshots of the specified PVCs from the given namespace
- name: Delete VolumeSnapshots of the specified PVCs from {{ delete_volume_snapshots_pvc_namespace | default('') }} namespace
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: absent
    kind: VolumeSnapshot
    namespace: "{{ delete_volume_snapshots_pvc_namespace | default('') }}"
    name: "{{ item.snapshot_name }}"
  loop: "{{ delete_volume_snapshots_volume_snapshot_specs | default([]) }}"
  when:
    - delete_volume_snapshots_pvc_namespace is defined and delete_volume_snapshots_pvc_namespace != ""
    - item.snapshot_name is defined and item.snapshot_name != ""
  tags:
    - k8s_delete_volume_snapshots
# Note: VolumeSnapshots are namespaced resources, so we delete them from the specified namespace.
