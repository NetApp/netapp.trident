---
# Delete VolumeSnapshots of the specified PVCs from the given namespace.

- name: Verify required variables are defined and not empty
  ansible.builtin.fail:
    msg: "{{ item }} is not defined or empty"
  when: "vars[item] is not defined or (vars[item] | default('') | string | length == 0)"
  loop:
    - delete_volume_snapshots_oc_api_url
    - delete_volume_snapshots_oc_api_token
    - delete_volume_snapshots_pvc_namespace
    - delete_volume_snapshots_volume_snapshot_specs

- name: Define anchor for OpenShift/Kubernetes API login info
  ansible.builtin.set_fact:
    k8s_auth: &k8s_auth
      host: "{{ delete_volume_snapshots_oc_api_url | default(omit) }}"
      api_key: "{{ delete_volume_snapshots_oc_api_token | default(omit) }}"
      validate_certs: "{{ delete_volume_snapshots_validate_certs | default(false) }}"

- name: Verify required fields in each delete_volume_snapshots_volume_snapshot_specs entry
  ansible.builtin.fail:
    msg: "delete_volume_snapshots_volume_snapshot_specs entry is missing required field '{{ item.1 }}': {{ item.0 }}"
  when:
    - item.0[item.1] is not defined or (item.0[item.1] | default('') | string | length == 0)
  loop: "{{ delete_volume_snapshots_volume_snapshot_specs | default([]) | product(['snapshot_name']) | list }}"
  loop_control:
    label: "{{ item.0.snapshot_name | default('<unnamed>') }}.{{ item.1 }}"

# Delete VolumeSnapshots of the specified PVCs from the given namespace
- name: Delete VolumeSnapshots of the specified PVCs from namespace {{ delete_volume_snapshots_pvc_namespace | default('') }}
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: absent
    kind: VolumeSnapshot
    namespace: "{{ delete_volume_snapshots_pvc_namespace | default('') }}"
    name: "{{ item.snapshot_name }}"
  loop: "{{ delete_volume_snapshots_volume_snapshot_specs | default([]) }}"
  when:
    - item.snapshot_name is defined and item.snapshot_name != ""
  tags:
    - k8s_delete_volume_snapshots
# Note: VolumeSnapshots are namespaced resources, so we delete them from the specified namespace.
