    name: "{{ delete_storageclass_fcp_specs.sc_name | default('') }}"
  when:
    - delete_storageclass_configure_fcp == true
    - delete_storageclass_fcp_specs is defined
    - delete_storageclass_fcp_specs.sc_name is defined and delete_storageclass_fcp_specs.sc_name != ""
  tags:
    - k8s_delete_fcp_storage_class
