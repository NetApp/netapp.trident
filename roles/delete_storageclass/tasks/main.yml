---
# Delete StorageClasses (cluster-scoped resources) created for each backend (NFS, NFS FlexGroup, iSCSI, NVMe/TCP, FCP).

- name: Verify required variables are defined and not empty
  ansible.builtin.fail:
    msg: "{{ item }} is not defined or empty"
  when: "vars[item] is not defined or (vars[item] | default('') | string | length == 0)"
  loop:
    - delete_storageclass_oc_api_url
    - delete_storageclass_oc_api_token

- name: Define anchor for OpenShift/Kubernetes API login info
  ansible.builtin.set_fact:
    k8s_auth: &k8s_auth
      host: "{{ delete_storageclass_oc_api_url | default(omit) }}"
      api_key: "{{ delete_storageclass_oc_api_token | default(omit) }}"
      validate_certs: "{{ delete_storageclass_validate_certs | default(false) }}"

- name: Verify at least one backend flag is enabled
  ansible.builtin.fail:
    msg: >-
      At least one of delete_storageclass_configure_nfs,
      delete_storageclass_configure_nfs_flexgroup,
      delete_storageclass_configure_iscsi,
      delete_storageclass_configure_nvme_tcp, or
      delete_storageclass_configure_fcp must be set to true.
  when:
    - not (delete_storageclass_configure_nfs | default(false) | bool)
    - not (delete_storageclass_configure_nfs_flexgroup | default(false) | bool)
    - not (delete_storageclass_configure_iscsi | default(false) | bool)
    - not (delete_storageclass_configure_nvme_tcp | default(false) | bool)
    - not (delete_storageclass_configure_fcp | default(false) | bool)

- name: Verify NFS backend variables are defined and not empty when NFS is enabled
  ansible.builtin.fail:
    msg: "{{ item }} is not defined or empty"
  when:
    - delete_storageclass_configure_nfs | default(false) | bool
    - "vars[item] is not defined or (vars[item] | default('') | string | length == 0)"
  loop:
    - delete_storageclass_nfs_specs

- name: Verify required fields in delete_storageclass_nfs_specs when NFS is enabled
  ansible.builtin.fail:
    msg: "delete_storageclass_nfs_specs.{{ item }} is not defined or empty"
  when:
    - delete_storageclass_configure_nfs | default(false) | bool
    - delete_storageclass_nfs_specs[item] is not defined or (delete_storageclass_nfs_specs[item] | default('') | string | length == 0)
  loop:
    - sc_name

- name: Verify NFS FlexGroup backend variables are defined and not empty when NFS FlexGroup is enabled
  ansible.builtin.fail:
    msg: "{{ item }} is not defined or empty"
  when:
    - delete_storageclass_configure_nfs_flexgroup | default(false) | bool
    - "vars[item] is not defined or (vars[item] | default('') | string | length == 0)"
  loop:
    - delete_storageclass_nfs_flexgroup_specs

- name: Verify required fields in delete_storageclass_nfs_flexgroup_specs when NFS FlexGroup is enabled
  ansible.builtin.fail:
    msg: "delete_storageclass_nfs_flexgroup_specs.{{ item }} is not defined or empty"
  when:
    - delete_storageclass_configure_nfs_flexgroup | default(false) | bool
    - delete_storageclass_nfs_flexgroup_specs[item] is not defined or (delete_storageclass_nfs_flexgroup_specs[item] | default('') | string | length == 0)
  loop:
    - sc_name

- name: Verify iSCSI backend variables are defined and not empty when iSCSI is enabled
  ansible.builtin.fail:
    msg: "{{ item }} is not defined or empty"
  when:
    - delete_storageclass_configure_iscsi | default(false) | bool
    - "vars[item] is not defined or (vars[item] | default('') | string | length == 0)"
  loop:
    - delete_storageclass_iscsi_specs

- name: Verify required fields in delete_storageclass_iscsi_specs when iSCSI is enabled
  ansible.builtin.fail:
    msg: "delete_storageclass_iscsi_specs.{{ item }} is not defined or empty"
  when:
    - delete_storageclass_configure_iscsi | default(false) | bool
    - delete_storageclass_iscsi_specs[item] is not defined or (delete_storageclass_iscsi_specs[item] | default('') | string | length == 0)
  loop:
    - sc_name

- name: Verify NVMe/TCP backend variables are defined and not empty when NVMe/TCP is enabled
  ansible.builtin.fail:
    msg: "{{ item }} is not defined or empty"
  when:
    - delete_storageclass_configure_nvme_tcp | default(false) | bool
    - "vars[item] is not defined or (vars[item] | default('') | string | length == 0)"
  loop:
    - delete_storageclass_nvme_tcp_specs

- name: Verify required fields in delete_storageclass_nvme_tcp_specs when NVMe/TCP is enabled
  ansible.builtin.fail:
    msg: "delete_storageclass_nvme_tcp_specs.{{ item }} is not defined or empty"
  when:
    - delete_storageclass_configure_nvme_tcp | default(false) | bool
    - delete_storageclass_nvme_tcp_specs[item] is not defined or (delete_storageclass_nvme_tcp_specs[item] | default('') | string | length == 0)
  loop:
    - sc_name

- name: Verify FCP backend variables are defined and not empty when FCP is enabled
  ansible.builtin.fail:
    msg: "{{ item }} is not defined or empty"
  when:
    - delete_storageclass_configure_fcp | default(false) | bool
    - "vars[item] is not defined or (vars[item] | default('') | string | length == 0)"
  loop:
    - delete_storageclass_fcp_specs

- name: Verify required fields in delete_storageclass_fcp_specs when FCP is enabled
  ansible.builtin.fail:
    msg: "delete_storageclass_fcp_specs.{{ item }} is not defined or empty"
  when:
    - delete_storageclass_configure_fcp | default(false) | bool
    - delete_storageclass_fcp_specs[item] is not defined or (delete_storageclass_fcp_specs[item] | default('') | string | length == 0)
  loop:
    - sc_name

# Delete NFS StorageClass
- name: Delete NFS StorageClass {{ delete_storageclass_nfs_specs.sc_name | default('') }}
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: absent
    kind: StorageClass
    name: "{{ delete_storageclass_nfs_specs.sc_name | default('') }}"
  when:
    - delete_storageclass_configure_nfs | bool
  tags:
    - k8s_delete_nfs_storage_class
# Note: StorageClass is a cluster-scoped resource, so we do not specify a namespace.

# Delete NFS FlexGroup StorageClass
- name: Delete NFS FlexGroup StorageClass {{ delete_storageclass_nfs_flexgroup_specs.sc_name | default('') }}
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: absent
    kind: StorageClass
    name: "{{ delete_storageclass_nfs_flexgroup_specs.sc_name | default('') }}"
  when:
    - delete_storageclass_configure_nfs_flexgroup | bool
  tags:
    - k8s_delete_nfs_flexgroup_storage_class

# Delete iSCSI StorageClass
- name: Delete iSCSI StorageClass {{ delete_storageclass_iscsi_specs.sc_name | default('') }}
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: absent
    kind: StorageClass
    name: "{{ delete_storageclass_iscsi_specs.sc_name | default('') }}"
  when:
    - delete_storageclass_configure_iscsi | bool
  tags:
    - k8s_delete_iscsi_storage_class

# Delete NVMe/TCP StorageClass
- name: Delete NVMe/TCP StorageClass {{ delete_storageclass_nvme_tcp_specs.sc_name | default('') }}
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: absent
    kind: StorageClass
    name: "{{ delete_storageclass_nvme_tcp_specs.sc_name | default('') }}"
  when:
    - delete_storageclass_configure_nvme_tcp | bool
  tags:
    - k8s_delete_nvme_tcp_storage_class

# Delete FCP StorageClass
- name: Delete FCP StorageClass {{ delete_storageclass_fcp_specs.sc_name | default('') }}
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: absent
    kind: StorageClass
    name: "{{ delete_storageclass_fcp_specs.sc_name | default('') }}"
  when:
    - delete_storageclass_configure_fcp | bool
  tags:
    - k8s_delete_fcp_storage_class
