---
# Delete StorageClasses (cluster-scoped resources) created for each backend (NFS, NFS FlexGroup, iSCSI, NVMe/TCP, FCP).

# Preflight: verify required variables are defined and not empty.
- name: Verify required variables are defined and not empty
  ansible.builtin.fail:
    msg: "Required variable '{{ item }}' is not defined or empty"
  when: "vars[item] is not defined or (vars[item] | length == 0)"
  loop:
    - oc_api_url
    - oc_api_token

# Define a YAML anchor for OpenShift/Kubernetes API login info.
# Reused below via '<<: *k8s_auth' to avoid repeating host/api_key/validate_certs
# across every k8s task.
- name: Define anchor for OpenShift/Kubernetes API login info
  ansible.builtin.set_fact:
    k8s_auth: &k8s_auth
      host: "{{ oc_api_url }}"
      api_key: "{{ oc_api_token }}"
      validate_certs: false

# Delete NFS StorageClass
- name: Delete NFS StorageClass {{ nfs_specs.sc_name | default('') }}
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: absent
    kind: StorageClass
    name: "{{ nfs_specs.sc_name | default('') }}"
  when:
    - configure_nfs == true
    - nfs_specs is defined
    - nfs_specs.sc_name is defined and nfs_specs.sc_name != ""
  tags:
    - k8s_delete_nfs_storage_class
# Note: StorageClass is a cluster-scoped resource, so we do not specify a namespace.

# Delete NFS FlexGroup StorageClass
- name: Delete NFS FlexGroup StorageClass {{ nfs_flexgroup_specs.sc_name | default('') }}
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: absent
    kind: StorageClass
    name: "{{ nfs_flexgroup_specs.sc_name | default('') }}"
  when:
    - configure_nfs_flexgroup == true
    - nfs_flexgroup_specs is defined
    - nfs_flexgroup_specs.sc_name is defined and nfs_flexgroup_specs.sc_name != ""
  tags:
    - k8s_delete_nfs_flexgroup_storage_class

# Delete iSCSI StorageClass
- name: Delete iSCSI StorageClass {{ iscsi_specs.sc_name | default('') }}
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: absent
    kind: StorageClass
    name: "{{ iscsi_specs.sc_name | default('') }}"
  when:
    - configure_iscsi == true
    - iscsi_specs is defined
    - iscsi_specs.sc_name is defined and iscsi_specs.sc_name != ""
  tags:
    - k8s_delete_iscsi_storage_class

# Delete NVMe/TCP StorageClass
- name: Delete NVMe/TCP StorageClass {{ nvme_tcp_specs.sc_name | default('') }}
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: absent
    kind: StorageClass
    name: "{{ nvme_tcp_specs.sc_name | default('') }}"
  when:
    - configure_nvme_tcp == true
    - nvme_tcp_specs is defined
    - nvme_tcp_specs.sc_name is defined and nvme_tcp_specs.sc_name != ""
  tags:
    - k8s_delete_nvme_tcp_storage_class

# Delete FCP StorageClass
- name: Delete FCP StorageClass {{ fcp_specs.sc_name | default('') }}
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: absent
    kind: StorageClass
    name: "{{ fcp_specs.sc_name | default('') }}"
  when:
    - configure_fcp == true
    - fcp_specs is defined
    - fcp_specs.sc_name is defined and fcp_specs.sc_name != ""
  tags:
    - k8s_delete_fcp_storage_class
