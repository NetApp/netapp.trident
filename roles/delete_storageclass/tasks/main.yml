    - delete_storageclass_configure_iscsi == true
    - delete_storageclass_iscsi_specs is defined
    - delete_storageclass_iscsi_specs.sc_name is defined and delete_storageclass_iscsi_specs.sc_name != ""
  tags:
    - k8s_delete_iscsi_storage_class

# Delete NVMe/TCP StorageClass
- name: Delete NVMe/TCP StorageClass {{ delete_storageclass_nvme_tcp_specs.sc_name | default('') }}
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: absent
    kind: StorageClass
    name: "{{ delete_storageclass_nvme_tcp_specs.sc_name | default('') }}"
