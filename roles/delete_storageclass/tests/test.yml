---
- name: Test delete_storageclass role
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    delete_storageclass_oc_api_url: "https://api.example.openshift.com:6443"
    delete_storageclass_oc_api_token: "<your_api_token>"
    delete_storageclass_configure_nfs: true
    delete_storageclass_nfs_specs:
      sc_name: ontap-nfs-sc
  roles:
    - delete_storageclass
