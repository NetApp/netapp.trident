---
# Create PersistentVolumeClaims (PVCs) using the Trident StorageClasses.

# Preflight: verify required variables are defined and not empty.
- name: Verify required variables are defined and not empty
  ansible.builtin.fail:
    msg: "Required variable '{{ item }}' is not defined or empty"
  when: "vars[item] is not defined or (vars[item] | length == 0)"
  loop:
    - create_pvcs_oc_api_url
    - create_pvcs_oc_api_token
    - create_pvcs_pvc_namespace

# Define a YAML anchor for OpenShift/Kubernetes API login info.
# Reused below via '<<: *k8s_auth' to avoid repeating host/api_key/validate_certs
# across every k8s task.
- name: Define anchor for OpenShift/Kubernetes API login info
  ansible.builtin.set_fact:
    k8s_auth: &k8s_auth
      host: "{{ create_pvcs_oc_api_url }}"
      api_key: "{{ create_pvcs_oc_api_token }}"
      validate_certs: false

# Create a new project/namespace for creating PVCs
- name: Create a new project/namespace for creating PVCs
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ create_pvcs_pvc_namespace }}"
  when:
    - create_pvcs_configure_nfs or create_pvcs_configure_nfs_flexgroup or create_pvcs_configure_iscsi or create_pvcs_configure_nvme_tcp or create_pvcs_configure_fcp
    - create_pvcs_pvc_namespace is defined and create_pvcs_pvc_namespace != ""
  tags:
    - k8s_create_pvc_namespace

# Create PVCs with NFS storage class in the specified namespace
- name: Create PVCs with NFS storage class in the {{ create_pvcs_pvc_namespace | default('') }} namespace
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: present
    namespace: "{{ create_pvcs_pvc_namespace | default('') }}"
    definition:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: "{{ item.pvc_name }}"
      spec:
        accessModes: "{{ item.access_modes }}"
        resources:
          requests:
            storage: "{{ item.pvc_size }}"
        storageClassName: "{{ create_pvcs_nfs_specs.sc_name }}"
        volumeMode: Filesystem
  loop: "{{ create_pvcs_nfs_specs.pvc_info | default([]) }}"
  when:
    - create_pvcs_configure_nfs == true
    - create_pvcs_nfs_specs is defined
    - create_pvcs_nfs_specs.sc_name is defined and create_pvcs_nfs_specs.sc_name != ""
    - create_pvcs_pvc_namespace is defined and create_pvcs_pvc_namespace != ""
    - item.pvc_name is defined and item.pvc_name != ""
    - item.pvc_size is defined and item.pvc_size != ""
    - item.access_modes is defined and item.access_modes | length > 0
  tags:
    - k8s_create_nfs_pvcs

# Create PVCs with NFS FlexGroup storage class in the specified namespace
- name: Create PVCs with NFS FlexGroup storage class in the {{ create_pvcs_pvc_namespace | default('') }} namespace
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: present
    namespace: "{{ create_pvcs_pvc_namespace | default('') }}"
    definition:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: "{{ item.pvc_name }}"
      spec:
        accessModes: "{{ item.access_modes }}"
        resources:
          requests:
            storage: "{{ item.pvc_size }}"
        storageClassName: "{{ create_pvcs_nfs_flexgroup_specs.sc_name }}"
        volumeMode: Filesystem
  loop: "{{ create_pvcs_nfs_flexgroup_specs.pvc_info | default([]) }}"
  when:
    - create_pvcs_configure_nfs_flexgroup == true
    - create_pvcs_nfs_flexgroup_specs is defined
    - create_pvcs_nfs_flexgroup_specs.sc_name is defined and create_pvcs_nfs_flexgroup_specs.sc_name != ""
    - create_pvcs_pvc_namespace is defined and create_pvcs_pvc_namespace != ""
    - item.pvc_name is defined and item.pvc_name != ""
    - item.pvc_size is defined and item.pvc_size != ""
    - item.access_modes is defined and item.access_modes | length > 0
    - >
      (item.pvc_size is match('^[0-9]+Ki$') and (item.pvc_size | regex_replace('Ki$', '') | int) >= 838860800) or
      (item.pvc_size is match('^[0-9]+Mi$') and (item.pvc_size | regex_replace('Mi$', '') | int) >= 819200) or
      (item.pvc_size is match('^[0-9]+Gi$') and (item.pvc_size | regex_replace('Gi$', '') | int) >= 800) or
      (item.pvc_size is match('^[0-9]+Ti$') and (item.pvc_size | regex_replace('Ti$', '') | int) >= 1) or
      (item.pvc_size is match('^[0-9]+Pi$')) or
      (item.pvc_size is match('^[0-9]+Ei$'))
  tags:
    - k8s_create_nfs_flexgroup_pvcs

# Warn about skipped NFS FlexGroup PVCs with size less than 800Gi
- name: Display warning for NFS FlexGroup PVCs with size less than 800Gi
  ansible.builtin.debug:
    msg: "WARNING: Skipping PVC '{{ item.pvc_name }}' - NFS FlexGroup requires minimum size of 800Gi. Requested size: {{ item.pvc_size }}"
  loop: "{{ create_pvcs_nfs_flexgroup_specs.pvc_info | default([]) }}"
  when:
    - create_pvcs_configure_nfs_flexgroup == true
    - create_pvcs_nfs_flexgroup_specs is defined
    - item.pvc_name is defined and item.pvc_name != ""
    - item.pvc_size is defined and item.pvc_size != ""
    - >
      not (
        (item.pvc_size is match('^[0-9]+Ki$') and (item.pvc_size | regex_replace('Ki$', '') | int) >= 838860800) or
        (item.pvc_size is match('^[0-9]+Mi$') and (item.pvc_size | regex_replace('Mi$', '') | int) >= 819200) or
        (item.pvc_size is match('^[0-9]+Gi$') and (item.pvc_size | regex_replace('Gi$', '') | int) >= 800) or
        (item.pvc_size is match('^[0-9]+Ti$') and (item.pvc_size | regex_replace('Ti$', '') | int) >= 1) or
        (item.pvc_size is match('^[0-9]+Pi$')) or
        (item.pvc_size is match('^[0-9]+Ei$'))
      )
  tags:
    - k8s_create_nfs_flexgroup_pvcs

# Create PVCs with iSCSI storage class in the specified namespace
- name: Create PVCs with iSCSI storage class in the {{ create_pvcs_pvc_namespace | default('') }} namespace
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: present
    namespace: "{{ create_pvcs_pvc_namespace | default('') }}"
    definition:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: "{{ item.pvc_name }}"
      spec:
        accessModes: "{{ item.access_modes }}"
        resources:
          requests:
            storage: "{{ item.pvc_size }}"
        storageClassName: "{{ create_pvcs_iscsi_specs.sc_name }}"
        volumeMode: "{{ item.volume_mode | default('Filesystem') }}"
  loop: "{{ create_pvcs_iscsi_specs.pvc_info | default([]) }}"
  when:
    - create_pvcs_configure_iscsi == true
    - create_pvcs_iscsi_specs is defined
    - create_pvcs_iscsi_specs.sc_name is defined and create_pvcs_iscsi_specs.sc_name != ""
    - create_pvcs_pvc_namespace is defined and create_pvcs_pvc_namespace != ""
    - item.pvc_name is defined and item.pvc_name != ""
    - item.pvc_size is defined and item.pvc_size != ""
    - item.access_modes is defined and item.access_modes | length > 0
    - not ('ReadWriteMany' in item.access_modes and (item.volume_mode | default('Filesystem')) == 'Filesystem')
  tags:
    - k8s_create_iscsi_pvcs

# Warn about skipped iSCSI PVCs with unsupported RWX + Filesystem combination
- name: Display warning for iSCSI PVCs with unsupported RWX + Filesystem configuration
  ansible.builtin.debug:
    msg: "WARNING: Skipping PVC '{{ item.pvc_name }}' - iSCSI does not support ReadWriteMany (RWX) access mode with Filesystem volume mode. Use ReadWriteMany (RWX) with Block volume mode."
  loop: "{{ create_pvcs_iscsi_specs.pvc_info | default([]) }}"
  when:
    - create_pvcs_configure_iscsi == true
    - create_pvcs_iscsi_specs is defined
    - item.pvc_name is defined and item.pvc_name != ""
    - item.access_modes is defined and item.access_modes | length > 0
    - "'ReadWriteMany' in item.access_modes"
    - (item.volume_mode | default('Filesystem')) == 'Filesystem'
  tags:
    - k8s_create_iscsi_pvcs

