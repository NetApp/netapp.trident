---
# Create PersistentVolumeClaims (PVCs) using the Trident StorageClasses.

- name: Verify required variables are defined and not empty
  ansible.builtin.fail:
    msg: "{{ item }} is not defined or empty"
  when: "vars[item] is not defined or (vars[item] | default('') | string | length == 0)"
  loop:
    - create_pvcs_oc_api_url
    - create_pvcs_oc_api_token
    - create_pvcs_pvc_namespace

- name: Define anchor for OpenShift/Kubernetes API login info
  ansible.builtin.set_fact:
    k8s_auth: &k8s_auth
      host: "{{ create_pvcs_oc_api_url | default(omit) }}"
      api_key: "{{ create_pvcs_oc_api_token | default(omit) }}"
      validate_certs: "{{ create_pvcs_validate_certs | default(false) }}"

- name: Verify at least one backend flag is enabled
  ansible.builtin.fail:
    msg: >-
      At least one of create_pvcs_configure_nfs,
      create_pvcs_configure_nfs_flexgroup,
      create_pvcs_configure_iscsi,
      create_pvcs_configure_nvme_tcp, or
      create_pvcs_configure_fcp must be set to true.
  when:
    - not (create_pvcs_configure_nfs | default(false) | bool)
    - not (create_pvcs_configure_nfs_flexgroup | default(false) | bool)
    - not (create_pvcs_configure_iscsi | default(false) | bool)
    - not (create_pvcs_configure_nvme_tcp | default(false) | bool)
    - not (create_pvcs_configure_fcp | default(false) | bool)

- name: Verify NFS backend variables are defined and not empty when NFS is enabled
  ansible.builtin.fail:
    msg: "{{ item }} is not defined or empty"
  when:
    - create_pvcs_configure_nfs | default(false) | bool
    - "vars[item] is not defined or (vars[item] | default('') | string | length == 0)"
  loop:
    - create_pvcs_nfs_specs

- name: Verify required fields in create_pvcs_nfs_specs when NFS is enabled
  ansible.builtin.fail:
    msg: "create_pvcs_nfs_specs.{{ item }} is not defined or empty"
  when:
    - create_pvcs_configure_nfs | default(false) | bool
    - create_pvcs_nfs_specs[item] is not defined or (create_pvcs_nfs_specs[item] | default('') | string | length == 0)
  loop:
    - sc_name

- name: Verify required fields in each create_pvcs_nfs_specs.pvc_info entry when NFS is enabled
  ansible.builtin.fail:
    msg: "create_pvcs_nfs_specs.pvc_info entry is missing required field '{{ item.1 }}': {{ item.0 }}"
  when:
    - create_pvcs_configure_nfs | default(false) | bool
    - item.0[item.1] is not defined or (item.0[item.1] | default('') | string | length == 0)
  loop: "{{ create_pvcs_nfs_specs.pvc_info | default([]) | product(['pvc_name', 'pvc_size', 'access_modes']) | list }}"
  loop_control:
    label: "{{ item.0.pvc_name | default('<unnamed>') }}.{{ item.1 }}"

- name: Verify NFS FlexGroup backend variables are defined and not empty when NFS FlexGroup is enabled
  ansible.builtin.fail:
    msg: "{{ item }} is not defined or empty"
  when:
    - create_pvcs_configure_nfs_flexgroup | default(false) | bool
    - "vars[item] is not defined or (vars[item] | default('') | string | length == 0)"
  loop:
    - create_pvcs_nfs_flexgroup_specs

- name: Verify required fields in create_pvcs_nfs_flexgroup_specs when NFS FlexGroup is enabled
  ansible.builtin.fail:
    msg: "create_pvcs_nfs_flexgroup_specs.{{ item }} is not defined or empty"
  when:
    - create_pvcs_configure_nfs_flexgroup | default(false) | bool
    - create_pvcs_nfs_flexgroup_specs[item] is not defined or (create_pvcs_nfs_flexgroup_specs[item] | default('') | string | length == 0)
  loop:
    - sc_name

- name: Verify required fields in each create_pvcs_nfs_flexgroup_specs.pvc_info entry when NFS FlexGroup is enabled
  ansible.builtin.fail:
    msg: "create_pvcs_nfs_flexgroup_specs.pvc_info entry is missing required field '{{ item.1 }}': {{ item.0 }}"
  when:
    - create_pvcs_configure_nfs_flexgroup | default(false) | bool
    - item.0[item.1] is not defined or (item.0[item.1] | default('') | string | length == 0)
  loop: "{{ create_pvcs_nfs_flexgroup_specs.pvc_info | default([]) | product(['pvc_name', 'pvc_size', 'access_modes']) | list }}"
  loop_control:
    label: "{{ item.0.pvc_name | default('<unnamed>') }}.{{ item.1 }}"

