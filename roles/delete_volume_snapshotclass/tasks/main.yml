---
# Delete VolumeSnapshotClass (cluster-scoped resource).

# Preflight: verify required variables are defined and not empty.
- name: Verify required variables are defined and not empty
  ansible.builtin.fail:
    msg: "Required variable '{{ item }}' is not defined or empty"
  when: "vars[item] is not defined or (vars[item] | length == 0)"
  loop:
    - delete_volume_snapshotclass_oc_api_url
    - delete_volume_snapshotclass_oc_api_token
    - delete_volume_snapshotclass_vol_snapshot_class_specs

# Preflight: required nested fields in the spec.
- name: Verify delete_volume_snapshotclass_vol_snapshot_class_specs.name is set
  ansible.builtin.fail:
    msg: "delete_volume_snapshotclass_vol_snapshot_class_specs.name is not defined or empty"
  when:
    - delete_volume_snapshotclass_vol_snapshot_class_specs.name is not defined or (delete_volume_snapshotclass_vol_snapshot_class_specs.name | length == 0)

# Define a YAML anchor for OpenShift/Kubernetes API login info.
# Reused below via '<<: *k8s_auth' to avoid repeating host/api_key/validate_certs
# across every k8s task.
- name: Define anchor for OpenShift/Kubernetes API login info
  ansible.builtin.set_fact:
    k8s_auth: &k8s_auth
      host: "{{ delete_volume_snapshotclass_oc_api_url }}"
      api_key: "{{ delete_volume_snapshotclass_oc_api_token }}"
      validate_certs: "{{ delete_volume_snapshotclass_validate_certs | default(false) }}"

# Delete VolumeSnapshotClass (cluster-scoped resource)
- name: Delete VolumeSnapshotClass {{ delete_volume_snapshotclass_vol_snapshot_class_specs.name | default('') }}
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: absent
    kind: VolumeSnapshotClass
    name: "{{ delete_volume_snapshotclass_vol_snapshot_class_specs.name | default('') }}"
  tags:
    - k8s_delete_volume_snapshot_class
# Note: VolumeSnapshotClass is a cluster-scoped resource, so we do not specify a namespace.
