---
# Create a VolumeSnapshotClass for NetApp Trident snapshot operations.

# Preflight: verify required variables are defined and not empty.
- name: Verify required variables are defined and not empty
  ansible.builtin.fail:
    msg: "Required variable '{{ item }}' is not defined or empty"
  when: "vars[item] is not defined or (vars[item] | length == 0)"
  loop:
    - create_volume_snapshotclass_oc_api_url
    - create_volume_snapshotclass_oc_api_token
    - create_volume_snapshotclass_vol_snapshot_class_specs

# Preflight: required nested fields in the spec.
- name: Verify create_volume_snapshotclass_vol_snapshot_class_specs.name is set
  ansible.builtin.fail:
    msg: "create_volume_snapshotclass_vol_snapshot_class_specs.name is not defined or empty"
  when:
    - create_volume_snapshotclass_vol_snapshot_class_specs.name is not defined or (create_volume_snapshotclass_vol_snapshot_class_specs.name | length == 0)

# Define a YAML anchor for OpenShift/Kubernetes API login info.
# Reused below via '<<: *k8s_auth' to avoid repeating host/api_key/validate_certs
# across every k8s task.
- name: Define anchor for OpenShift/Kubernetes API login info
  ansible.builtin.set_fact:
    k8s_auth: &k8s_auth
      host: "{{ create_volume_snapshotclass_oc_api_url }}"
      api_key: "{{ create_volume_snapshotclass_oc_api_token }}"
      validate_certs: false

# Create VolumeSnapshotClass for snapshot operations
- name: Create VolumeSnapshotClass for snapshot operations
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: present
    definition:
      apiVersion: snapshot.storage.k8s.io/v1
      kind: VolumeSnapshotClass
      metadata:
        name: "{{ create_volume_snapshotclass_vol_snapshot_class_specs.name }}"
      driver: csi.trident.netapp.io
      deletionPolicy: "{{ create_volume_snapshotclass_vol_snapshot_class_specs.deletion_policy | default('Delete') }}"
  tags:
    - k8s_create_volume_snapshot_class
