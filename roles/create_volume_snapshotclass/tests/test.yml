---
- name: Test create_volume_snapshotclass role
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    create_volume_snapshotclass_oc_api_url: "https://api.example.openshift.com:6443"
    create_volume_snapshotclass_oc_api_token: "<your_api_token>"
    create_volume_snapshotclass_vol_snapshot_class_specs:
      name: test-ontap-snapshot-class
      deletion_policy: Delete
  roles:
    - create_volume_snapshotclass
