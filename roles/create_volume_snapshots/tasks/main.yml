---
# Create VolumeSnapshots of the PVCs in the specified namespace.

# Preflight: verify required variables are defined and not empty.
- name: Verify required variables are defined and not empty
  ansible.builtin.fail:
    msg: "Required variable '{{ item }}' is not defined or empty"
  when: "vars[item] is not defined or (vars[item] | length == 0)"
  loop:
    - create_volume_snapshots_oc_api_url
    - create_volume_snapshots_oc_api_token
    - create_volume_snapshots_pvc_namespace
    - create_volume_snapshots_vol_snapshot_class_specs
    - create_volume_snapshots_volume_snapshot_specs

# Preflight: required nested fields in the spec.
- name: Verify create_volume_snapshots_vol_snapshot_class_specs.name is set
  ansible.builtin.fail:
    msg: "create_volume_snapshots_vol_snapshot_class_specs.name is not defined or empty"
  when:
    - create_volume_snapshots_vol_snapshot_class_specs.name is not defined or (create_volume_snapshots_vol_snapshot_class_specs.name | length == 0)

# Define a YAML anchor for OpenShift/Kubernetes API login info.
# Reused below via '<<: *k8s_auth' to avoid repeating host/api_key/validate_certs
# across every k8s task.
- name: Define anchor for OpenShift/Kubernetes API login info
  ansible.builtin.set_fact:
    k8s_auth: &k8s_auth
      host: "{{ create_volume_snapshots_oc_api_url }}"
      api_key: "{{ create_volume_snapshots_oc_api_token }}"
      validate_certs: "{{ create_volume_snapshots_validate_certs | default(false) }}"

# Get all PVCs in the namespace to validate before creating snapshots
- name: Get all PVCs in the {{ create_volume_snapshots_pvc_namespace | default('') }} namespace
  kubernetes.core.k8s_info:
    <<: *k8s_auth
    kind: PersistentVolumeClaim
    namespace: "{{ create_volume_snapshots_pvc_namespace | default('') }}"
    api_version: v1
  register: existing_pvcs
  tags:
    - k8s_create_volume_snapshots

# Create VolumeSnapshots of the specified PVCs in the given namespace
- name: Create VolumeSnapshots of the specified PVCs in the {{ create_volume_snapshots_pvc_namespace | default('') }} namespace
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: present
    namespace: "{{ create_volume_snapshots_pvc_namespace | default('') }}"
    definition:
      apiVersion: snapshot.storage.k8s.io/v1
      kind: VolumeSnapshot
      metadata:
        name: "{{ item.snapshot_name }}"
      spec:
        volumeSnapshotClassName: "{{ create_volume_snapshots_vol_snapshot_class_specs.name }}"
        source:
          persistentVolumeClaimName: "{{ item.pvc_name }}"
  loop: "{{ create_volume_snapshots_volume_snapshot_specs | default([]) }}"
  when:
    - item.snapshot_name is defined and item.snapshot_name != ""
    - item.pvc_name is defined and item.pvc_name != ""
    - existing_pvcs is defined
    - existing_pvcs.resources is defined
    - item.pvc_name in (existing_pvcs.resources | map(attribute='metadata.name') | list)
  tags:
    - k8s_create_volume_snapshots

# Display warning for snapshots with non-existent PVCs
- name: Display warning for VolumeSnapshots with non-existent PVCs
  ansible.builtin.debug:
    msg: "WARNING: Skipping snapshot '{{ item.snapshot_name }}' - PVC '{{ item.pvc_name }}' does not exist in namespace '{{ create_volume_snapshots_pvc_namespace | default('') }}'"
  loop: "{{ create_volume_snapshots_volume_snapshot_specs | default([]) }}"
  when:
    - existing_pvcs is defined
    - existing_pvcs.resources is defined
    - item.snapshot_name is defined and item.snapshot_name != ""
    - item.pvc_name is defined and item.pvc_name != ""
    - item.pvc_name not in (existing_pvcs.resources | map(attribute='metadata.name') | list)
  tags:
    - k8s_create_volume_snapshots
