---
# Create Kubernetes StorageClasses using NetApp Trident as the provisioner.

# Preflight: verify required variables are defined and not empty.
- name: Verify required variables are defined and not empty
  ansible.builtin.fail:
    msg: "Required variable '{{ item }}' is not defined or empty"
  when: "vars[item] is not defined or (vars[item] | length == 0)"
  loop:
    - create_storageclass_oc_api_url
    - create_storageclass_oc_api_token

# Define a YAML anchor for OpenShift/Kubernetes API login info.
# Reused below via '<<: *k8s_auth' to avoid repeating host/api_key/validate_certs
# across every k8s task.
- name: Define anchor for OpenShift/Kubernetes API login info
  ansible.builtin.set_fact:
    k8s_auth: &k8s_auth
      host: "{{ create_storageclass_oc_api_url }}"
      api_key: "{{ create_storageclass_oc_api_token }}"
      validate_certs: false

# Create NFS storage class with specified volume binding mode
- name: Create NFS storage class with {{ create_storageclass_nfs_specs.sc_volume_binding_mode | default('') }} volume binding mode
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: present
    definition:
      apiVersion: storage.k8s.io/v1
      kind: StorageClass
      metadata:
        name: "{{ create_storageclass_nfs_specs.sc_name }}"
        annotations:
          storageclass.kubernetes.io/is-default-class: "false"
      provisioner: csi.trident.netapp.io
      parameters:
        backendType: "ontap-nas"
        provisioningType: "thin"
        snapshots: "true"
      allowVolumeExpansion: true
      reclaimPolicy: "{{ create_storageclass_nfs_specs.sc_reclaim_policy | default('Retain') }}"
      volumeBindingMode: "{{ create_storageclass_nfs_specs.sc_volume_binding_mode }}"
      mountOptions:
        - nfsvers="{{ create_storageclass_nfs_specs.nfs_version }}"
  when:
    - create_storageclass_configure_nfs == true
    - create_storageclass_nfs_specs is defined
    - create_storageclass_nfs_specs.sc_name is defined and create_storageclass_nfs_specs.sc_name != ""
    - create_storageclass_nfs_specs.sc_volume_binding_mode is defined and create_storageclass_nfs_specs.sc_volume_binding_mode != ""
    - create_storageclass_nfs_specs.nfs_version is defined and create_storageclass_nfs_specs.nfs_version != ""
  tags:
    - k8s_create_nfs_storage_class

