---
# Create Kubernetes StorageClasses using NetApp Trident as the provisioner.

- name: Verify required variables are defined and not empty
  ansible.builtin.fail:
    msg: "{{ item }} is not defined or empty"
  when: "vars[item] is not defined or (vars[item] | default('') | string | length == 0)"
  loop:
    - create_storageclass_oc_api_url
    - create_storageclass_oc_api_token

- name: Define anchor for OpenShift/Kubernetes API login info
  ansible.builtin.set_fact:
    k8s_auth: &k8s_auth
      host: "{{ create_storageclass_oc_api_url | default(omit) }}"
      api_key: "{{ create_storageclass_oc_api_token | default(omit) }}"
      validate_certs: "{{ create_storageclass_validate_certs | default(false) }}"

- name: Verify at least one backend flag is enabled
  ansible.builtin.fail:
    msg: >-
      At least one of create_storageclass_configure_nfs,
      create_storageclass_configure_nfs_flexgroup,
      create_storageclass_configure_iscsi,
      create_storageclass_configure_nvme_tcp, or
      create_storageclass_configure_fcp must be set to true.
  when:
    - not (create_storageclass_configure_nfs | default(false) | bool)
    - not (create_storageclass_configure_nfs_flexgroup | default(false) | bool)
    - not (create_storageclass_configure_iscsi | default(false) | bool)
    - not (create_storageclass_configure_nvme_tcp | default(false) | bool)
    - not (create_storageclass_configure_fcp | default(false) | bool)

- name: Verify NFS backend variables are defined and not empty when NFS is enabled
  ansible.builtin.fail:
    msg: "{{ item }} is not defined or empty"
  when:
    - create_storageclass_configure_nfs | default(false) | bool
    - "vars[item] is not defined or (vars[item] | default('') | string | length == 0)"
  loop:
    - create_storageclass_nfs_specs

- name: Verify required fields in create_storageclass_nfs_specs when NFS is enabled
  ansible.builtin.fail:
    msg: "create_storageclass_nfs_specs.{{ item }} is not defined or empty"
  when:
    - create_storageclass_configure_nfs | default(false) | bool
    - create_storageclass_nfs_specs[item] is not defined or (create_storageclass_nfs_specs[item] | default('') | string | length == 0)
  loop:
    - sc_name
    - sc_volume_binding_mode
    - nfs_version

- name: Verify NFS FlexGroup backend variables are defined and not empty when NFS FlexGroup is enabled
  ansible.builtin.fail:
    msg: "{{ item }} is not defined or empty"
  when:
    - create_storageclass_configure_nfs_flexgroup | default(false) | bool
    - "vars[item] is not defined or (vars[item] | default('') | string | length == 0)"
  loop:
    - create_storageclass_nfs_flexgroup_specs

- name: Verify required fields in create_storageclass_nfs_flexgroup_specs when NFS FlexGroup is enabled
  ansible.builtin.fail:
    msg: "create_storageclass_nfs_flexgroup_specs.{{ item }} is not defined or empty"
  when:
    - create_storageclass_configure_nfs_flexgroup | default(false) | bool
    - create_storageclass_nfs_flexgroup_specs[item] is not defined or (create_storageclass_nfs_flexgroup_specs[item] | default('') | string | length == 0)
  loop:
    - sc_name
    - sc_volume_binding_mode
    - nfs_version

- name: Verify iSCSI backend variables are defined and not empty when iSCSI is enabled
  ansible.builtin.fail:
    msg: "{{ item }} is not defined or empty"
  when:
    - create_storageclass_configure_iscsi | default(false) | bool
    - "vars[item] is not defined or (vars[item] | default('') | string | length == 0)"
  loop:
    - create_storageclass_iscsi_specs

- name: Verify required fields in create_storageclass_iscsi_specs when iSCSI is enabled
  ansible.builtin.fail:
    msg: "create_storageclass_iscsi_specs.{{ item }} is not defined or empty"
  when:
    - create_storageclass_configure_iscsi | default(false) | bool
    - create_storageclass_iscsi_specs[item] is not defined or (create_storageclass_iscsi_specs[item] | default('') | string | length == 0)
  loop:
    - sc_name
    - sc_volume_binding_mode

- name: Verify NVMe/TCP backend variables are defined and not empty when NVMe/TCP is enabled
  ansible.builtin.fail:
    msg: "{{ item }} is not defined or empty"
  when:
    - create_storageclass_configure_nvme_tcp | default(false) | bool
    - "vars[item] is not defined or (vars[item] | default('') | string | length == 0)"
  loop:
    - create_storageclass_nvme_tcp_specs

- name: Verify required fields in create_storageclass_nvme_tcp_specs when NVMe/TCP is enabled
  ansible.builtin.fail:
    msg: "create_storageclass_nvme_tcp_specs.{{ item }} is not defined or empty"
  when:
    - create_storageclass_configure_nvme_tcp | default(false) | bool
    - create_storageclass_nvme_tcp_specs[item] is not defined or (create_storageclass_nvme_tcp_specs[item] | default('') | string | length == 0)
  loop:
    - sc_name
    - sc_volume_binding_mode

- name: Verify FCP backend variables are defined and not empty when FCP is enabled
  ansible.builtin.fail:
    msg: "{{ item }} is not defined or empty"
  when:
    - create_storageclass_configure_fcp | default(false) | bool
    - "vars[item] is not defined or (vars[item] | default('') | string | length == 0)"
  loop:
    - create_storageclass_fcp_specs

- name: Verify required fields in create_storageclass_fcp_specs when FCP is enabled
  ansible.builtin.fail:
    msg: "create_storageclass_fcp_specs.{{ item }} is not defined or empty"
  when:
    - create_storageclass_configure_fcp | default(false) | bool
    - create_storageclass_fcp_specs[item] is not defined or (create_storageclass_fcp_specs[item] | default('') | string | length == 0)
  loop:
    - sc_name
    - sc_volume_binding_mode

# Create NFS storage class with specified volume binding mode
- name: Create NFS storage class with volume binding mode {{ create_storageclass_nfs_specs.sc_volume_binding_mode | default('') }}
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: present
    definition:
      apiVersion: storage.k8s.io/v1
      kind: StorageClass
      metadata:
        name: "{{ create_storageclass_nfs_specs.sc_name }}"
        annotations:
          storageclass.kubernetes.io/is-default-class: "false"
      provisioner: csi.trident.netapp.io
      parameters:
        backendType: "ontap-nas"
        provisioningType: "thin"
        snapshots: "true"
      allowVolumeExpansion: true
      reclaimPolicy: "{{ create_storageclass_nfs_specs.sc_reclaim_policy | default('Retain') }}"
      volumeBindingMode: "{{ create_storageclass_nfs_specs.sc_volume_binding_mode }}"
      mountOptions:
        - nfsvers="{{ create_storageclass_nfs_specs.nfs_version }}"
  when:
    - create_storageclass_configure_nfs | bool
  tags:
    - k8s_create_nfs_storage_class

# Create NFS FlexGroup storage class with specified volume binding mode
- name: Create NFS FlexGroup storage class with volume binding mode {{ create_storageclass_nfs_flexgroup_specs.sc_volume_binding_mode | default('') }}
  kubernetes.core.k8s:
