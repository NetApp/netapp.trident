---
- name: Test create_storageclass role
  hosts: localhost
  gather_facts: false
  connection: local
  vars:
    create_storageclass_oc_api_url: "https://api.example.openshift.com:6443"
    create_storageclass_oc_api_token: "<your_api_token>"
    create_storageclass_configure_nfs: true
    create_storageclass_configure_nfs_flexgroup: true
    create_storageclass_configure_iscsi: true
    create_storageclass_configure_fcp: true
    create_storageclass_configure_nvme_tcp: true
    create_storageclass_nfs_specs:
      sc_name: ontap-nfs-sc
      sc_reclaim_policy: Delete
      sc_volume_binding_mode: Immediate
      nfs_version: "4.1"
    create_storageclass_nfs_flexgroup_specs:
      sc_name: ontap-nfs-flexgroup-sc
      sc_reclaim_policy: Delete
      sc_volume_binding_mode: Immediate
      nfs_version: "4.1"
    create_storageclass_iscsi_specs:
      sc_name: ontap-iscsi-sc
      sc_reclaim_policy: Delete
      sc_volume_binding_mode: Immediate
    create_storageclass_nvme_tcp_specs:
      sc_name: ontap-nvme-tcp-sc
      sc_reclaim_policy: Delete
      sc_volume_binding_mode: Immediate
    create_storageclass_fcp_specs:
      sc_name: ontap-fcp-sc
      sc_reclaim_policy: Delete
      sc_volume_binding_mode: Immediate
  roles:
    - create_storageclass

# test cases to validate the creation of storage classes can be added here, for example: