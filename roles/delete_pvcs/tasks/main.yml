---
# Delete PersistentVolumeClaims (PVCs) from the specified namespace and remove the namespace.

- name: Verify required variables are defined and not empty
  ansible.builtin.fail:
    msg: "{{ item }} is not defined or empty"
  when: "vars[item] is not defined or (vars[item] | default('') | string | length == 0)"
  loop:
    - delete_pvcs_oc_api_url
    - delete_pvcs_oc_api_token
    - delete_pvcs_pvc_namespace

- name: Define anchor for OpenShift/Kubernetes API login info
  ansible.builtin.set_fact:
    k8s_auth: &k8s_auth
      host: "{{ delete_pvcs_oc_api_url | default(omit) }}"
      api_key: "{{ delete_pvcs_oc_api_token | default(omit) }}"
      validate_certs: "{{ delete_pvcs_validate_certs | default(false) }}"

- name: Verify at least one backend flag is enabled
  ansible.builtin.fail:
    msg: >-
      At least one of delete_pvcs_configure_nfs,
      delete_pvcs_configure_nfs_flexgroup,
      delete_pvcs_configure_iscsi,
      delete_pvcs_configure_nvme_tcp, or
      delete_pvcs_configure_fcp must be set to true.
  when:
    - not (delete_pvcs_configure_nfs | default(false) | bool)
    - not (delete_pvcs_configure_nfs_flexgroup | default(false) | bool)
    - not (delete_pvcs_configure_iscsi | default(false) | bool)
    - not (delete_pvcs_configure_nvme_tcp | default(false) | bool)
    - not (delete_pvcs_configure_fcp | default(false) | bool)

- name: Verify NFS backend variables are defined and not empty when NFS is enabled
  ansible.builtin.fail:
    msg: "{{ item }} is not defined or empty"
  when:
    - delete_pvcs_configure_nfs | default(false) | bool
    - "vars[item] is not defined or (vars[item] | default('') | string | length == 0)"
  loop:
    - delete_pvcs_nfs_specs

- name: Verify NFS FlexGroup backend variables are defined and not empty when NFS FlexGroup is enabled
  ansible.builtin.fail:
    msg: "{{ item }} is not defined or empty"
  when:
    - delete_pvcs_configure_nfs_flexgroup | default(false) | bool
    - "vars[item] is not defined or (vars[item] | default('') | string | length == 0)"
  loop:
    - delete_pvcs_nfs_flexgroup_specs

- name: Verify iSCSI backend variables are defined and not empty when iSCSI is enabled
  ansible.builtin.fail:
    msg: "{{ item }} is not defined or empty"
  when:
    - delete_pvcs_configure_iscsi | default(false) | bool
    - "vars[item] is not defined or (vars[item] | default('') | string | length == 0)"
  loop:
    - delete_pvcs_iscsi_specs

- name: Verify NVMe/TCP backend variables are defined and not empty when NVMe/TCP is enabled
  ansible.builtin.fail:
    msg: "{{ item }} is not defined or empty"
  when:
    - delete_pvcs_configure_nvme_tcp | default(false) | bool
    - "vars[item] is not defined or (vars[item] | default('') | string | length == 0)"
  loop:
    - delete_pvcs_nvme_tcp_specs

- name: Verify FCP backend variables are defined and not empty when FCP is enabled
  ansible.builtin.fail:
    msg: "{{ item }} is not defined or empty"
  when:
    - delete_pvcs_configure_fcp | default(false) | bool
    - "vars[item] is not defined or (vars[item] | default('') | string | length == 0)"
  loop:
    - delete_pvcs_fcp_specs

- name: Verify required fields in each delete_pvcs_nfs_specs.pvc_info entry when NFS is enabled
  ansible.builtin.fail:
    msg: "delete_pvcs_nfs_specs.pvc_info entry is missing required field '{{ item.1 }}': {{ item.0 }}"
  when:
    - delete_pvcs_configure_nfs | default(false) | bool
    - item.0[item.1] is not defined or (item.0[item.1] | default('') | string | length == 0)
  loop: "{{ delete_pvcs_nfs_specs.pvc_info | default([]) | product(['pvc_name']) | list }}"
  loop_control:
    label: "{{ item.0.pvc_name | default('<unnamed>') }}.{{ item.1 }}"

- name: Verify required fields in each delete_pvcs_nfs_flexgroup_specs.pvc_info entry when NFS FlexGroup is enabled
  ansible.builtin.fail:
    msg: "delete_pvcs_nfs_flexgroup_specs.pvc_info entry is missing required field '{{ item.1 }}': {{ item.0 }}"
  when:
    - delete_pvcs_configure_nfs_flexgroup | default(false) | bool
    - item.0[item.1] is not defined or (item.0[item.1] | default('') | string | length == 0)
  loop: "{{ delete_pvcs_nfs_flexgroup_specs.pvc_info | default([]) | product(['pvc_name']) | list }}"
  loop_control:
    label: "{{ item.0.pvc_name | default('<unnamed>') }}.{{ item.1 }}"

- name: Verify required fields in each delete_pvcs_iscsi_specs.pvc_info entry when iSCSI is enabled
  ansible.builtin.fail:
    msg: "delete_pvcs_iscsi_specs.pvc_info entry is missing required field '{{ item.1 }}': {{ item.0 }}"
  when:
    - delete_pvcs_configure_iscsi | default(false) | bool
    - item.0[item.1] is not defined or (item.0[item.1] | default('') | string | length == 0)
  loop: "{{ delete_pvcs_iscsi_specs.pvc_info | default([]) | product(['pvc_name']) | list }}"
  loop_control:
    label: "{{ item.0.pvc_name | default('<unnamed>') }}.{{ item.1 }}"

- name: Verify required fields in each delete_pvcs_nvme_tcp_specs.pvc_info entry when NVMe/TCP is enabled
  ansible.builtin.fail:
    msg: "delete_pvcs_nvme_tcp_specs.pvc_info entry is missing required field '{{ item.1 }}': {{ item.0 }}"
  when:
    - delete_pvcs_configure_nvme_tcp | default(false) | bool
    - item.0[item.1] is not defined or (item.0[item.1] | default('') | string | length == 0)
  loop: "{{ delete_pvcs_nvme_tcp_specs.pvc_info | default([]) | product(['pvc_name']) | list }}"
  loop_control:
    label: "{{ item.0.pvc_name | default('<unnamed>') }}.{{ item.1 }}"

- name: Verify required fields in each delete_pvcs_fcp_specs.pvc_info entry when FCP is enabled
  ansible.builtin.fail:
    msg: "delete_pvcs_fcp_specs.pvc_info entry is missing required field '{{ item.1 }}': {{ item.0 }}"
  when:
    - delete_pvcs_configure_fcp | default(false) | bool
    - item.0[item.1] is not defined or (item.0[item.1] | default('') | string | length == 0)
  loop: "{{ delete_pvcs_fcp_specs.pvc_info | default([]) | product(['pvc_name']) | list }}"
  loop_control:
    label: "{{ item.0.pvc_name | default('<unnamed>') }}.{{ item.1 }}"

# Delete PVCs with NFS storage class from the specified namespace
- name: Delete NFS PVCs from namespace {{ delete_pvcs_pvc_namespace | default('') }}
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: absent
    kind: PersistentVolumeClaim
    namespace: "{{ delete_pvcs_pvc_namespace | default('') }}"
    name: "{{ item.pvc_name }}"
  loop: "{{ delete_pvcs_nfs_specs.pvc_info | default([]) }}"
  when:
    - delete_pvcs_configure_nfs | bool
    - item.pvc_name is defined and item.pvc_name != ""
  tags:
    - k8s_delete_nfs_pvcs
# Note: PVCs are namespaced resources, so we delete them from the specified namespace.

# Delete PVCs with NFS FlexGroup storage class from the specified namespace
- name: Delete NFS FlexGroup PVCs from namespace {{ delete_pvcs_pvc_namespace | default('') }}
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: absent
    kind: PersistentVolumeClaim
    namespace: "{{ delete_pvcs_pvc_namespace | default('') }}"
    name: "{{ item.pvc_name }}"
  loop: "{{ delete_pvcs_nfs_flexgroup_specs.pvc_info | default([]) }}"
  when:
    - delete_pvcs_configure_nfs_flexgroup | bool
    - item.pvc_name is defined and item.pvc_name != ""
  tags:
    - k8s_delete_nfs_flexgroup_pvcs

# Delete PVCs with iSCSI storage class from the specified namespace
- name: Delete iSCSI PVCs from namespace {{ delete_pvcs_pvc_namespace | default('') }}
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: absent
    kind: PersistentVolumeClaim
    namespace: "{{ delete_pvcs_pvc_namespace | default('') }}"
    name: "{{ item.pvc_name }}"
  loop: "{{ delete_pvcs_iscsi_specs.pvc_info | default([]) }}"
  when:
    - delete_pvcs_configure_iscsi | bool
    - item.pvc_name is defined and item.pvc_name != ""
  tags:
    - k8s_delete_iscsi_pvcs

# Delete PVCs with NVMe/TCP storage class from the specified namespace
- name: Delete NVMe/TCP PVCs from namespace {{ delete_pvcs_pvc_namespace | default('') }}
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: absent
    kind: PersistentVolumeClaim
    namespace: "{{ delete_pvcs_pvc_namespace | default('') }}"
    name: "{{ item.pvc_name }}"
  loop: "{{ delete_pvcs_nvme_tcp_specs.pvc_info | default([]) }}"
  when:
    - delete_pvcs_configure_nvme_tcp | bool
    - item.pvc_name is defined and item.pvc_name != ""
  tags:
    - k8s_delete_nvme_tcp_pvcs

# Delete PVCs with FCP storage class from the specified namespace
- name: Delete FCP PVCs from namespace {{ delete_pvcs_pvc_namespace | default('') }}
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: absent
    kind: PersistentVolumeClaim
    namespace: "{{ delete_pvcs_pvc_namespace | default('') }}"
    name: "{{ item.pvc_name }}"
  loop: "{{ delete_pvcs_fcp_specs.pvc_info | default([]) }}"
  when:
    - delete_pvcs_configure_fcp | bool
    - item.pvc_name is defined and item.pvc_name != ""
  tags:
    - k8s_delete_fcp_pvcs

# Delete namespace that was created for provisioning PVCs
- name: Delete namespace {{ delete_pvcs_pvc_namespace | default('') }}
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: absent
    kind: Namespace
    name: "{{ delete_pvcs_pvc_namespace }}"
  tags:
    - k8s_delete_namespace
