# Delete PVCs with NVMe/TCP storage class from the specified namespace
- name: Delete NVMe/TCP PVCs from {{ delete_pvcs_pvc_namespace | default('') }} namespace
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: absent
