---
# Delete PersistentVolumeClaims (PVCs) from the specified namespace and remove the namespace.

# Preflight: verify required variables are defined and not empty.
- name: Verify required variables are defined and not empty
  ansible.builtin.fail:
    msg: "Required variable '{{ item }}' is not defined or empty"
  when: "vars[item] is not defined or (vars[item] | length == 0)"
  loop:
    - oc_api_url
    - oc_api_token
    - pvc_namespace

# Define a YAML anchor for OpenShift/Kubernetes API login info.
# Reused below via '<<: *k8s_auth' to avoid repeating host/api_key/validate_certs
# across every k8s task.
- name: Define anchor for OpenShift/Kubernetes API login info
  ansible.builtin.set_fact:
    k8s_auth: &k8s_auth
      host: "{{ oc_api_url }}"
      api_key: "{{ oc_api_token }}"
      validate_certs: false

# Delete PVCs with NFS storage class from the specified namespace
- name: Delete NFS PVCs from {{ pvc_namespace | default('') }} namespace
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: absent
    kind: PersistentVolumeClaim
    namespace: "{{ pvc_namespace | default('') }}"
    name: "{{ item.pvc_name }}"
  loop: "{{ nfs_specs.pvc_info | default([]) }}"
  when:
    - configure_nfs == true
    - pvc_namespace is defined and pvc_namespace != ""
    - item.pvc_name is defined and item.pvc_name != ""
  tags:
    - k8s_delete_nfs_pvcs
# Note: PVCs are namespaced resources, so we delete them from the specified namespace.

# Delete PVCs with NFS FlexGroup storage class from the specified namespace
- name: Delete NFS FlexGroup PVCs from {{ pvc_namespace | default('') }} namespace
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: absent
    kind: PersistentVolumeClaim
    namespace: "{{ pvc_namespace | default('') }}"
    name: "{{ item.pvc_name }}"
  loop: "{{ nfs_flexgroup_specs.pvc_info | default([]) }}"
  when:
    - configure_nfs_flexgroup == true
    - pvc_namespace is defined and pvc_namespace != ""
    - item.pvc_name is defined and item.pvc_name != ""
  tags:
    - k8s_delete_nfs_flexgroup_pvcs

# Delete PVCs with iSCSI storage class from the specified namespace
- name: Delete iSCSI PVCs from {{ pvc_namespace | default('') }} namespace
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: absent
    kind: PersistentVolumeClaim
    namespace: "{{ pvc_namespace | default('') }}"
    name: "{{ item.pvc_name }}"
  loop: "{{ iscsi_specs.pvc_info | default([]) }}"
  when:
    - configure_iscsi == true
    - pvc_namespace is defined and pvc_namespace != ""
    - item.pvc_name is defined and item.pvc_name != ""
  tags:
    - k8s_delete_iscsi_pvcs

# Delete PVCs with NVMe/TCP storage class from the specified namespace
- name: Delete NVMe/TCP PVCs from {{ pvc_namespace | default('') }} namespace
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: absent
    kind: PersistentVolumeClaim
    namespace: "{{ pvc_namespace | default('') }}"
    name: "{{ item.pvc_name }}"
  loop: "{{ nvme_tcp_specs.pvc_info | default([]) }}"
  when:
    - configure_nvme_tcp == true
    - pvc_namespace is defined and pvc_namespace != ""
    - item.pvc_name is defined and item.pvc_name != ""
  tags:
    - k8s_delete_nvme_tcp_pvcs

# Delete PVCs with FCP storage class from the specified namespace
- name: Delete FCP PVCs from {{ pvc_namespace | default('') }} namespace
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: absent
    kind: PersistentVolumeClaim
    namespace: "{{ pvc_namespace | default('') }}"
    name: "{{ item.pvc_name }}"
  loop: "{{ fcp_specs.pvc_info | default([]) }}"
  when:
    - configure_fcp == true
    - pvc_namespace is defined and pvc_namespace != ""
    - item.pvc_name is defined and item.pvc_name != ""
  tags:
    - k8s_delete_fcp_pvcs

# Delete namespace that was created for provisioning PVCs
- name: Delete namespace {{ pvc_namespace | default('') }}
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: absent
    kind: Namespace
    name: "{{ pvc_namespace | default('') }}"
  when: pvc_namespace is defined and pvc_namespace != ""
  tags:
    - k8s_delete_namespace
