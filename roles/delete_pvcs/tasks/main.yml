    - k8s_delete_nvme_tcp_pvcs

# Delete PVCs with FCP storage class from the specified namespace
- name: Delete FCP PVCs from {{ delete_pvcs_pvc_namespace | default('') }} namespace
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: absent
    kind: PersistentVolumeClaim
    namespace: "{{ delete_pvcs_pvc_namespace | default('') }}"
    name: "{{ item.pvc_name }}"
  loop: "{{ delete_pvcs_fcp_specs.pvc_info | default([]) }}"
  when:
    - delete_pvcs_configure_fcp == true
    - delete_pvcs_pvc_namespace is defined and delete_pvcs_pvc_namespace != ""
    - item.pvc_name is defined and item.pvc_name != ""
  tags:
    - k8s_delete_fcp_pvcs

# Delete namespace that was created for provisioning PVCs
- name: Delete namespace {{ delete_pvcs_pvc_namespace | default('') }}
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: absent
    kind: Namespace
    name: "{{ delete_pvcs_pvc_namespace | default('') }}"
  when: delete_pvcs_pvc_namespace is defined and delete_pvcs_pvc_namespace != ""
  tags:
    - k8s_delete_namespace
