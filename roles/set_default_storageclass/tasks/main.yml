---
# Set the default Kubernetes StorageClass.

# Preflight: verify required variables are defined and not empty.
- name: Verify required variables are defined and not empty
  ansible.builtin.fail:
    msg: "Required variable '{{ item }}' is not defined or empty"
  when: "vars[item] is not defined or (vars[item] | length == 0)"
  loop:
    - set_default_storageclass_oc_api_url
    - set_default_storageclass_oc_api_token
    - set_default_storageclass_default_sc

# Define a YAML anchor for OpenShift/Kubernetes API login info.
# Reused below via '<<: *k8s_auth' to avoid repeating host/api_key/validate_certs
# across every k8s task.
- name: Define anchor for OpenShift/Kubernetes API login info
  ansible.builtin.set_fact:
    k8s_auth: &k8s_auth
      host: "{{ set_default_storageclass_oc_api_url }}"
      api_key: "{{ set_default_storageclass_oc_api_token }}"
      validate_certs: false

# Get all existing storage classes to check for current default
- name: Get all existing storage classes
  kubernetes.core.k8s_info:
    <<: *k8s_auth
    kind: StorageClass
    api_version: storage.k8s.io/v1
  register: existing_storage_classes
  when:
    - set_default_storageclass_default_sc is defined and set_default_storageclass_default_sc != ""
    - set_default_storageclass_configure_nfs or set_default_storageclass_configure_nfs_flexgroup or set_default_storageclass_configure_iscsi or set_default_storageclass_configure_nvme_tcp or set_default_storageclass_configure_fcp
  tags:
    - k8s_set_default_storage_class

# Remove default annotation from any existing default storage classes
- name: Remove default annotation from existing default storage classes
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: present
    kind: StorageClass
    api_version: storage.k8s.io/v1
    name: "{{ item.metadata.name }}"
    merge_type: strategic-merge
    definition:
      metadata:
        annotations:
          storageclass.kubernetes.io/is-default-class: "false"
  loop: "{{ existing_storage_classes.resources | default([]) }}"
  when:
    - set_default_storageclass_default_sc is defined and set_default_storageclass_default_sc != ""
    - set_default_storageclass_configure_nfs or set_default_storageclass_configure_nfs_flexgroup or set_default_storageclass_configure_iscsi or set_default_storageclass_configure_nvme_tcp or set_default_storageclass_configure_fcp
    - item.metadata.annotations is defined
    - item.metadata.annotations['storageclass.kubernetes.io/is-default-class'] is defined
    - item.metadata.annotations['storageclass.kubernetes.io/is-default-class'] | string == "true"
  tags:
    - k8s_set_default_storage_class

# Set one of the created storage classes as the default storage class
- name: Set {{ set_default_storageclass_default_sc | default('') }} as the default storage class
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: present
    kind: StorageClass
    api_version: storage.k8s.io/v1
    name: "{{ set_default_storageclass_default_sc }}"
    merge_type: strategic-merge
    definition:
      metadata:
        annotations:
          storageclass.kubernetes.io/is-default-class: "true"
  when:
    - set_default_storageclass_default_sc is defined and set_default_storageclass_default_sc != ""
    - set_default_storageclass_configure_nfs or set_default_storageclass_configure_nfs_flexgroup or set_default_storageclass_configure_iscsi or set_default_storageclass_configure_nvme_tcp or set_default_storageclass_configure_fcp
  tags:
    - k8s_set_default_storage_class
