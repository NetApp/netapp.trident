---
# Set the default Kubernetes StorageClass.

- name: Verify required variables are defined and not empty
  ansible.builtin.fail:
    msg: "{{ item }} is not defined or empty"
  when: "vars[item] is not defined or (vars[item] | default('') | string | length == 0)"
  loop:
    - set_default_storageclass_oc_api_url
    - set_default_storageclass_oc_api_token
    - set_default_storageclass_default_sc

- name: Define anchor for OpenShift/Kubernetes API login info
  ansible.builtin.set_fact:
    k8s_auth: &k8s_auth
      host: "{{ set_default_storageclass_oc_api_url | default(omit) }}"
      api_key: "{{ set_default_storageclass_oc_api_token | default(omit) }}"
      validate_certs: "{{ set_default_storageclass_validate_certs | default(false) }}"

- name: Verify at least one backend flag is enabled
  ansible.builtin.fail:
    msg: >-
      At least one of set_default_storageclass_configure_nfs,
      set_default_storageclass_configure_nfs_flexgroup,
      set_default_storageclass_configure_iscsi,
      set_default_storageclass_configure_nvme_tcp, or
      set_default_storageclass_configure_fcp must be set to true.
  when:
    - not (set_default_storageclass_configure_nfs | default(false) | bool)
    - not (set_default_storageclass_configure_nfs_flexgroup | default(false) | bool)
    - not (set_default_storageclass_configure_iscsi | default(false) | bool)
    - not (set_default_storageclass_configure_nvme_tcp | default(false) | bool)
    - not (set_default_storageclass_configure_fcp | default(false) | bool)

# Get all existing storage classes to check for current default
- name: Get all existing storage classes
  kubernetes.core.k8s_info:
    <<: *k8s_auth
    kind: StorageClass
    api_version: storage.k8s.io/v1
  register: existing_storage_classes
  tags:
    - k8s_set_default_storage_class

# Remove default annotation from any existing default storage classes
- name: Remove default annotation from existing default storage classes
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: present
    kind: StorageClass
    api_version: storage.k8s.io/v1
    name: "{{ item.metadata.name }}"
    merge_type: strategic-merge
    definition:
      metadata:
        annotations:
          storageclass.kubernetes.io/is-default-class: "false"
  loop: "{{ existing_storage_classes.resources | default([]) }}"
  when:
    - item.metadata.annotations is defined
    - item.metadata.annotations['storageclass.kubernetes.io/is-default-class'] is defined
    - item.metadata.annotations['storageclass.kubernetes.io/is-default-class'] | string == "true"
  tags:
    - k8s_set_default_storage_class

# Set one of the created storage classes as the default storage class
- name: Set default storage class to {{ set_default_storageclass_default_sc | default('') }}
  kubernetes.core.k8s:
    <<: *k8s_auth
    state: present
    kind: StorageClass
    api_version: storage.k8s.io/v1
    name: "{{ set_default_storageclass_default_sc }}"
    merge_type: strategic-merge
    definition:
      metadata:
        annotations:
          storageclass.kubernetes.io/is-default-class: "true"
  tags:
    - k8s_set_default_storage_class
